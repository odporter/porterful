---
name: "80% Artists Hoodie"
type: hoodie-design
description: Purple hoodie representing the 80% artist payout
colors: Purple hoodie, white/orange text
use: Embroidery or screen print
---

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Purple hoodie body -->
  <rect width="400" height="500" fill="#8B5CF6"/>
  
  <!-- Hood shape -->
  <ellipse cx="200" cy="80" rx="100" ry="60" fill="#7C3AED"/>
  <ellipse cx="200" cy="75" rx="80" ry="45" fill="#6D28D9"/>
  
  <!-- Hoodie strings -->
  <line x1="160" y1="100" x2="160" y2="180" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  <line x1="240" y1="100" x2="240" y2="180" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  <circle cx="160" cy="185" r="8" fill="#ff6b00"/>
  <circle cx="240" cy="185" r="8" fill="#ff6b00"/>
  
  <!-- Large 80% stat -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#ffffff">80%</text>
  
  <!-- TO ARTISTS -->
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="6">TO ARTISTS</text>
  
  <!-- Bottom text -->
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C4B5FD" letter-spacing="2">PORTERFUL</text>
  
  <!-- Pocket outline -->
  <path d="M 120 380 L 280 380 L 280 430 Q 200 440 120 430 Z" fill="#7C3AED"/>
</svg>
