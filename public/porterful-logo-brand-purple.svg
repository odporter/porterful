<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- FULL COLOR - Dark Background with brand purple accent -->
  <rect width="500" height="500" fill="#0a0a0a"/>
  <!-- Purple gradient overlay -->
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- P Icon - Purple -->
  <rect x="120" y="100" width="35" height="300" rx="8" fill="url(#purpleGrad)"/>
  <rect x="170" y="140" width="150" height="30" rx="6" fill="url(#purpleGrad)"/>
  <rect x="170" y="195" width="110" height="30" rx="6" fill="url(#purpleGrad)"/>
  <rect x="170" y="250" width="150" height="30" rx="6" fill="url(#purpleGrad)"/>
  <rect x="170" y="305" width="75" height="30" rx="6" fill="url(#purpleGrad)"/>
  <!-- Text -->
  <text x="250" y="450" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">PORTERFUL</text>
</svg>