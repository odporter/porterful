---
name: "Artist Economy"
type: shirt-design
description: The Artist Economy statement piece
colors: Black shirt, gold/white text
use: Screen print or DTG
---

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Black shirt -->
  <rect width="400" height="500" fill="#0a0a0a"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="#333333" stroke-width="2"/>
  <rect x="30" y="30" width="340" height="440" fill="none" stroke="#333333" stroke-width="1"/>
  
  <!-- THE -->
  <text x="200" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#888888" letter-spacing="8">THE</text>
  
  <!-- ARTIST -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#ffffff">ARTIST</text>
  
  <!-- ECONOMY - gold -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#FFD700">ECONOMY</text>
  
  <!-- Divider -->
  <line x1="100" y1="325" x2="300" y2="325" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Porterful -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ff6b00" letter-spacing="4">PORTERFUL</text>
  
  <!-- URL -->
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555555" letter-spacing="2">PORTERFUL.COM</text>
</svg>
