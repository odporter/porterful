---
name: "Own Everything White"
type: shirt-design
description: White tee with bold statement and purple/orange gradient
colors: White shirt, purple/orange gradient text
use: Screen print or DTG
---

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- White shirt -->
  <rect width="400" height="500" fill="#ffffff"/>
  
  <!-- Large background P watermark -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" fill="#f5f5f5">P</text>
  
  <!-- Main statement -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="42" font-weight="900" fill="#8B5CF6">OWN</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="42" font-weight="900" fill="#ff6b00">EVERYTHING</text>
  
  <!-- Porterful underneath -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666666" letter-spacing="3">PORTERFUL</text>
  
  <!-- Decorative lines -->
  <line x1="100" y1="330" x2="300" y2="330" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="100" y1="336" x2="300" y2="336" stroke="#ff6b00" stroke-width="2"/>
</svg>
